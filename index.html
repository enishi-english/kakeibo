<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4F46E5">
  <title>Kakeibo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-light: #EEF2FF;
      --bg: #F1F5F9;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #1E293B;
      --text-muted: #64748B;
      --nav-height: 64px;
      --header-height: 60px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }
    #app { padding-bottom: calc(var(--nav-height) + 8px); }

    /* ── Header ── */
    .header {
      background: var(--primary);
      color: white;
      padding: 14px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--header-height);
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 3px; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: var(--nav-height);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 11px;
      transition: color 0.15s;
      padding: 0;
    }
    .nav-item.active { color: var(--primary); }
    .nav-item .icon { font-size: 22px; line-height: 1; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 16px;
      margin: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* ── Forms ── */
    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    input[type="text"], input[type="number"], input[type="date"], select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, select:focus { border-color: var(--primary); }
    .amount-input {
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -1px;
      padding: 14px;
      border: 2px solid var(--border);
    }
    .amount-input:focus { border-color: var(--primary); }

    /* ── Category Grid ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .category-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 4px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      background: var(--surface);
      transition: all 0.15s;
      font-size: 11px;
      color: var(--text-muted);
      font-family: inherit;
    }
    .category-btn:active { transform: scale(0.96); }
    .category-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .category-btn .emoji { font-size: 22px; line-height: 1.2; }

    /* ── Payment Method ── */
    .pay-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
      letter-spacing: 0.2px;
    }
    .btn:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .btn-danger { background: #FEF2F2; color: #EF4444; border: 1.5px solid #FECACA; }

    /* ── Progress Bar ── */
    .progress-bar {
      height: 7px;
      background: var(--bg);
      border-radius: 100px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.5s ease;
    }

    /* ── Transaction List ── */
    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bg);
      cursor: pointer;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:active { opacity: 0.7; }
    .tx-emoji {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .tx-amount {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex-shrink: 0;
    }
    .tx-date-header {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      padding: 10px 14px 4px;
      display: flex;
      justify-content: space-between;
    }

    /* ── Month Selector ── */
    .month-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 2px;
    }
    .month-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 10px;
      color: var(--text-muted);
      font-family: inherit;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .month-btn:active { background: var(--border); }
    .month-label { font-size: 16px; font-weight: 700; color: var(--text); }

    /* ── Import Zone ── */
    .import-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .import-zone:hover, .import-zone:active { border-color: var(--primary); background: var(--primary-light); }
    .import-icon { font-size: 36px; margin-bottom: 8px; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-import { background: #E0F2FE; color: #0369A1; }

    /* ── Big Summary ── */
    .big-amount {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
    }
    .amount-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-height) + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: #1E293B;
      color: white;
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      z-index: 500;
      animation: toastIn 0.25s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* ── Scroll container ── */
    .scroll-list {
      max-height: 320px;
      overflow-y: auto;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .scroll-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--bg);
      font-size: 13px;
    }
    .scroll-item:last-child { border-bottom: none; }

    /* ── Settings row ── */
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--bg);
      cursor: pointer;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { font-size: 15px; font-weight: 500; }
    .settings-row-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Chip ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      background: var(--bg);
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }
    .tab-btn {
      padding: 10px 0;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      background: var(--bg);
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════
// CONSTANTS & CATEGORIES
// ════════════════════════════════════════════════════════════

const CATEGORIES = {
  food:          { name: 'Groceries',    emoji: '🛒', color: '#22C55E' },
  convenience:   { name: 'Konbini',      emoji: '🏪', color: '#059669' },
  dining:        { name: 'Dining Out',   emoji: '🍜', color: '#F97316' },
  cafe:          { name: 'Cafe',         emoji: '☕', color: '#92400E' },
  transport:     { name: 'Transport',    emoji: '🚃', color: '#3B82F6' },
  entertainment: { name: 'Fun',          emoji: '🎮', color: '#A855F7' },
  movies:        { name: 'Movies',       emoji: '🎬', color: '#7C3AED' },
  daily:         { name: 'Daily Items',  emoji: '🧴', color: '#14B8A6' },
  shopping:      { name: 'Shopping',     emoji: '🛍️', color: '#EC4899' },
  clothes:       { name: 'Clothes',      emoji: '👗', color: '#DB2777' },
  utilities:     { name: 'Utilities',    emoji: '💡', color: '#EAB308' },
  health:        { name: 'Health',       emoji: '🏥', color: '#EF4444' },
  vacation:      { name: 'Vacation',     emoji: '✈️', color: '#0EA5E9' },
  savings:       { name: 'Savings',      emoji: '💰', color: '#6366F1' },
  other:         { name: 'Other',        emoji: '📦', color: '#64748B' },
};

const PAYMENT_METHODS = {
  credit: { name: 'Credit Card',   icon: '💳' },
  cash:   { name: 'Cash',          icon: '💴' },
  bank:   { name: 'Bank Transfer', icon: '🏦' },
  emoney: { name: 'e-Money',       icon: '📱' },
};

const INCOME_CATEGORIES = {
  salary:  { name: 'Salary',   emoji: '💼', color: '#22C55E' },
  bonus:   { name: 'Bonus',    emoji: '🎁', color: '#6366F1' },
  other:   { name: 'Other',    emoji: '💹', color: '#14B8A6' },
};

// Auto-categorization rules
// Note: SMBC CSV uses old JIS katakana: ファ→フア, ジャ→ジヤ, ッ→ツ, ュ→ユ, ー→− etc.
// We normalize − to ー before matching, but other substitutions need explicit patterns.
const AUTO_RULES = [
  // Convenience stores
  { re: /ローソン|セブンイレブン|ファミリーマート|フアミリーマート|フアミリ|デイリーヤマザキ|ニューデイズ|ニユーデイ|ミニストップ|ポプラ|コンビニ|ポヴォ/, cat: 'convenience' },
  // Supermarkets
  { re: /イトーヨーカドー|マイバスケット|マイバスケツ|スーパー|ライフ|西友|イオン|マックスバリュ|業務スーパー/, cat: 'food' },
  // Vending machines
  { re: /ジヤパンビバレツジ|ジャパンビバレッジ|ビバレツジ|ビバレッジ|自動販売/, cat: 'convenience' },
  // Cafes
  { re: /カフェ|カフエ|スターバックス|タリーズ|ドトール|コーヒー|コーヒ|カルディ|デイルコヒ|ダイルコヒ|スタバ|パドラーズ/, cat: 'cafe' },
  // Dining / restaurants
  { re: /吉野家|ヨシノヤ|マクドナルド|ピザ|ラーメン|レストラン|バーガー|カツヤ|ビストロ|居酒屋|焼肉|カルビ|ヤキニク|天ぷら|とんかつ|蕎麦|うどん|タンドール|サンダイメ|チビトー|ルコ/, cat: 'dining' },
  // Movies
  { re: /映画|シネマ|東宝|シネマズ|映画館|トウホウ/, cat: 'movies' },
  // Transport
  { re: /スイカ|モバイルスイカ|モバイルスイ|交通|バス|タクシー|電車|地下鉄|PASMO|パスモ/, cat: 'transport' },
  // Amazon
  { re: /ＡＭＡＺＯＮ|Amazon|アマゾン/, cat: 'shopping' },
  // Streaming / subscriptions
  { re: /ネツトフリツクス|ネットフリックス|NETFLIX|Netflix|スポティファイ|Ｓｐｏｔｉｆｙ|Spotify|アップル|Applemusic|YouTube/, cat: 'entertainment' },
  // Utilities
  { re: /ガス|電気|水道|NHK|光熱|電力|東京ガス|トウキヨウガス|東電|ポポ/, cat: 'utilities' },
  // Health
  { re: /病院|薬|クリニック|医院|調剤|ドラッグ|マツキヨ|ウエルシア|ツルハ|スギ薬局|サンドラッグ/, cat: 'health' },
  // Clothes
  { re: /ユニクロ|GU|ジーユー|アパレル|ファッション|洋服|衣料|ルミネ|マルイ|キタセンジユ|ネオリーブ|ルカ/, cat: 'clothes' },
  // Shopping (general)
  { re: /プラザ|ニトリ|無印|コスメ|デパート|ショッピング/, cat: 'shopping' },
];

function normalizeJP(str) {
  // SMBC CSV uses fullwidth dashes instead of katakana prolonged sound mark (ー)
  return str
    .replace(/[－−‐—―]/g, 'ー')
    .replace(/\s+/g, ' ')
    .trim();
}

function autoCategory(merchant) {
  const norm = normalizeJP(merchant);
  for (const rule of AUTO_RULES) {
    if (rule.re.test(norm) || rule.re.test(merchant)) return rule.cat;
  }
  return 'other';
}

// ════════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════════

function loadData() {
  try { return JSON.parse(localStorage.getItem('kakeibo_v1') || '{}'); }
  catch { return {}; }
}

function saveData(data) {
  localStorage.setItem('kakeibo_v1', JSON.stringify(data));
}

function getState() {
  const d = loadData();
  return {
    transactions: d.transactions || [],
    budgets: d.budgets || {
      food: 30000, convenience: 10000, dining: 20000, cafe: 8000,
      transport: 15000, entertainment: 5000, movies: 3000,
      daily: 10000, shopping: 10000, clothes: 10000,
      utilities: 10000, health: 5000, vacation: 0,
      savings: 30000, other: 5000,
    },
    monthlyBudget: d.monthlyBudget || 150000,
  };
}

function setState(updates) {
  const current = loadData();
  saveData({ ...current, ...updates });
}

// ════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════

function uuid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function fmtYen(n) {
  return '¥' + Math.round(Math.abs(n)).toLocaleString('en-US');
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return `${MONTHS[dt.getMonth()]} ${dt.getDate()}`;
}

function fmtDateFull(d) {
  const dt = new Date(d + 'T00:00:00');
  return `${MONTHS_FULL[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
}

function todayStr() { return new Date().toISOString().slice(0, 10); }
function currentMonthStr() { return billingMonthOf(todayStr()); }

function monthLabel(ym) {
  const [y, m] = ym.split('-');
  return `${MONTHS_FULL[parseInt(m) - 1]} ${y}`;
}

function prevMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  return m === 1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
}

function nextMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  return m === 12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,'0')}`;
}

// Billing cycle: 28th of the PREVIOUS month through 27th of THIS month.
// e.g. "2026-05" covers Apr 28 – May 27 (matching the SMBC statement).
function billingMonthOf(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  if (d >= 28) {
    // belongs to the next month's billing cycle
    const nm = m === 12 ? 1 : m + 1;
    const ny = m === 12 ? y + 1 : y;
    return `${ny}-${String(nm).padStart(2, '0')}`;
  }
  return `${y}-${String(m).padStart(2, '0')}`;
}

function getMonthTxs(transactions, ym) {
  return transactions.filter(t => billingMonthOf(t.date) === ym);
}

// Human-readable billing cycle range for a given YM, e.g. "May 28 – Jun 27"
function billingCycleLabel(ym) {
  const [y, m] = ym.split('-').map(Number);
  const pm = m === 1 ? 12 : m - 1;
  const py = m === 1 ? y - 1 : y;
  return `${MONTHS[pm - 1]} 28 – ${MONTHS[m - 1]} 27`;
}

function spentByCategory(transactions) {
  const result = {};
  for (const k of Object.keys(CATEGORIES)) result[k] = 0;
  for (const t of transactions) {
    if (t.txType === 'income') continue;
    const k = t.category in result ? t.category : 'other';
    result[k] += t.amount;
  }
  return result;
}

function incomeByCategory(transactions) {
  const result = {};
  for (const k of Object.keys(INCOME_CATEGORIES)) result[k] = 0;
  for (const t of transactions) {
    if (t.txType !== 'income') continue;
    const k = t.incomeCategory in result ? t.incomeCategory : 'other';
    result[k] += t.amount;
  }
  return result;
}

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════

let _toastTimer = null;
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.remove(), 2600);
}

// ════════════════════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════════════════════

const App = {
  view: 'dashboard',
  currentMonth: currentMonthStr(),
  editingTx: null,
  filterCategory: null,

  go(view, opts = {}) {
    if (opts.resetEdit !== false) this.editingTx = null;
    // Clean up chart instance when leaving Charts view
    if (this.view === 'charts' && view !== 'charts' && _activeChart) {
      _activeChart.destroy(); _activeChart = null;
    }
    this.view = view;
    if (opts.month) this.currentMonth = opts.month;
    this.render();
  },

  render() {
    const root = document.getElementById('app');
    root.innerHTML = '';
    const views = {
      dashboard: renderDashboard,
      add:       renderAdd,
      history:   renderHistory,
      charts:    renderCharts,
      budget:    renderBudget,
      settings:  renderSettings,
      import:    renderImport,
    };
    if (views[this.view]) root.appendChild(views[this.view]());
    root.appendChild(renderNav());
  },
};

// ════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════

function renderDashboard() {
  const { transactions, budgets, monthlyBudget } = getState();
  const ym = App.currentMonth;
  const monthTxs = getMonthTxs(transactions, ym);
  const bycat = spentByCategory(monthTxs);
  const totalSpent = Object.values(bycat).reduce((a, b) => a + b, 0);
  const totalIncome = monthTxs.filter(t => t.txType === 'income').reduce((s, t) => s + t.amount, 0);
  const net = totalIncome - totalSpent;
  const remaining = monthlyBudget - totalSpent;
  const usedPct = monthlyBudget > 0 ? Math.min(100, Math.round((totalSpent / monthlyBudget) * 100)) : 0;
  const barColor = usedPct > 90 ? '#EF4444' : usedPct > 70 ? '#F97316' : '#22C55E';

  const div = document.createElement('div');

  // Header
  const header = document.createElement('div');
  header.className = 'header';
  header.innerHTML = `<h1>Kakeibo</h1><div class="subtitle">${monthLabel(ym)} &nbsp;·&nbsp; ${billingCycleLabel(ym)}</div>`;
  div.appendChild(header);

  // Month selector
  const ms = document.createElement('div');
  ms.className = 'month-selector';
  ms.innerHTML = `
    <button class="month-btn" id="prev-m">‹</button>
    <span class="month-label">${monthLabel(ym)}</span>
    <button class="month-btn" id="next-m">›</button>
  `;
  div.appendChild(ms);

  // Summary card
  const sumCard = document.createElement('div');
  sumCard.className = 'card';
  sumCard.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div style="background:#22C55E12;border-radius:8px;padding:10px">
        <div class="amount-label">Income</div>
        <div style="font-size:20px;font-weight:800;color:#15803D;margin-top:2px">${fmtYen(totalIncome)}</div>
      </div>
      <div style="background:#4F46E512;border-radius:8px;padding:10px">
        <div class="amount-label">Spending</div>
        <div style="font-size:20px;font-weight:800;color:#4F46E5;margin-top:2px">${fmtYen(totalSpent)}</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <div class="amount-label">Net this month</div>
        <div style="font-size:16px;font-weight:700;color:${net >= 0 ? '#22C55E' : '#EF4444'}">${net >= 0 ? '+' : ''}${fmtYen(net)}</div>
      </div>
      <div style="text-align:right">
        <div class="amount-label">Budget remaining</div>
        <div style="font-size:16px;font-weight:700;color:${remaining >= 0 ? '#22C55E' : '#EF4444'}">${remaining >= 0 ? fmtYen(remaining) : '-' + fmtYen(-remaining)}</div>
        <div class="amount-label">${usedPct}% used</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${usedPct}%;background:${barColor}"></div>
    </div>
  `;
  div.appendChild(sumCard);

  // Category breakdown
  const catCard = document.createElement('div');
  catCard.className = 'card';
  catCard.innerHTML = `<div class="card-title">By Category</div>`;

  const activeCats = Object.entries(CATEGORIES).filter(([k]) => bycat[k] > 0 || budgets[k] > 0);
  if (activeCats.length === 0) {
    catCard.innerHTML += `<div style="color:var(--text-muted);font-size:14px;text-align:center;padding:12px 0">Add your first transaction</div>`;
  } else {
    for (const [key, cat] of activeCats) {
      const spent = bycat[key] || 0;
      const bud = budgets[key] || 0;
      if (spent === 0 && bud === 0) continue;
      const pct = bud > 0 ? Math.min(100, Math.round((spent / bud) * 100)) : 0;
      const fillColor = pct > 90 ? '#EF4444' : pct > 70 ? '#F97316' : cat.color;
      const row = document.createElement('div');
      row.style.marginBottom = '12px';
      row.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:18px">${cat.emoji}</span>
            <span style="font-size:13px;font-weight:500">${cat.name}</span>
          </div>
          <div style="font-size:13px;text-align:right">
            <span style="font-weight:700">${fmtYen(spent)}</span>
            ${bud > 0 ? `<span style="color:var(--text-muted);font-size:11px"> / ${fmtYen(bud)}</span>` : ''}
          </div>
        </div>
        ${bud > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${fillColor}"></div></div>` : ''}
      `;
      catCard.appendChild(row);
    }
  }
  div.appendChild(catCard);

  // Recent transactions
  const recent = [...monthTxs].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
  if (recent.length > 0) {
    const txCard = document.createElement('div');
    txCard.className = 'card';
    const txHeader = document.createElement('div');
    txHeader.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';

    `;
    txCard.appendChild(txHeader);
    for (const tx of recent) txCard.appendChild(makeTxItem(tx));
    div.appendChild(txCard);
  }

  // Wire up
  setTimeout(() => {
    div.querySelector('#prev-m').onclick = () => App.go('dashboard', { month: prevMonth(App.currentMonth), resetEdit: false });
    div.querySelector('#next-m').onclick = () => App.go('dashboard', { month: nextMonth(App.currentMonth), resetEdit: false });
    const sa = div.querySelector('#see-all');
    if (sa) sa.onclick = () => App.go('history');
  }, 0);

  return div;
}

function makeTxItem(tx, onClick) {
  const isIncome = tx.txType === 'income';
  const cat = isIncome
    ? (INCOME_CATEGORIES[tx.incomeCategory] || INCOME_CATEGORIES.other)
    : (CATEGORIES[tx.category] || CATEGORIES.other);
  const div = document.createElement('div');
  div.className = 'tx-item';
  div.innerHTML = `
    <div class="tx-emoji" style="background:${cat.color}20">${cat.emoji}</div>
    <div class="tx-info">
      <div class="tx-name">${tx.description || cat.name}</div>
      <div class="tx-meta">
        ${fmtDate(tx.date)} · ${cat.name}
        ${isIncome ? ' · <span class="badge" style="background:#22C55E20;color:#15803D">Income</span>' : ''}
        ${tx.reconciled ? ' · <span class="badge" style="background:#22C55E20;color:#15803D">✓ Reconciled</span>' : ''}
        ${tx.source === 'smbc_import' && !tx.reconciled ? ' · <span class="badge badge-import">Imported</span>' : ''}
      </div>
    </div>
    <div class="tx-amount" style="color:${isIncome ? '#22C55E' : ''}">${isIncome ? '+' : '-'}${fmtYen(tx.amount)}</div>
  `;
  div.onclick = onClick || (() => {
    App.editingTx = { ...tx };
    App.go('add', { resetEdit: false });
  });
  return div;
}

          incomeCategory: _form.txType === 'income' ? _form.incomeCategory : undefined,

        showToast('Deleted');
        App.go('history');
      };
    }
  }, 0);

  return div;
}

      <div style="font-size:15px;font-weight:700;margin-bottom:4px">Tap to select CSV file</div>

  `;
  div.appendChild(card);

  backWrap.style.padding = '0 14px 14px';
  backWrap.innerHTML = `<button class="btn btn-secondary" id="back-btn">← Back</button>`;

    };

function processCSV(file, previewEl) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const buf = e.target.result;
    let text;
    try { text = new TextDecoder('shift-jis').decode(new Uint8Array(buf)); }
    catch { text = new TextDecoder('utf-8').decode(new Uint8Array(buf)); }

    const parsed = parseSMBCCSV(text);
    previewEl.innerHTML = '';

    if (parsed.length === 0) {
      previewEl.innerHTML = `<div style="color:#EF4444;text-align:center;padding:16px;font-size:14px">⚠️ No transactions found.<br><span style="font-size:12px;color:var(--text-muted)">Make sure this is an SMBC statement CSV.</span></div>`;
      return;
    }

    const { transactions } = getState();

    // Billing cycle
    const sortedDates = parsed.map(t => t.date).sort();
    const billingYm = billingMonthOf(sortedDates[sortedDates.length - 1]);
    const cycleLabel = billingCycleLabel(billingYm);

    // Already-imported hashes
    const existingHashes = new Set(transactions.filter(t => t.importHash).map(t => t.importHash));

    // Unreconciled manual expense entries in this billing cycle
    const manualPool = transactions.filter(t =>
      t.source === 'manual' && t.txType !== 'income' && !t.reconciled &&
      billingMonthOf(t.date) === billingYm
    ).map(t => ({ ...t, _used: false }));

    // Helper: days between two date strings
    const daysDiff = (a, b) => Math.abs((new Date(a) - new Date(b)) / 86400000);

    // Classify each CSV row
    const rows = parsed.map(csvTx => {
      if (existingHashes.has(csvTx.importHash)) return { csvTx, status: 'duplicate' };

      // Exact match: same date + same amount
      const exact = manualPool.find(m => !m._used && m.date === csvTx.date && m.amount === csvTx.amount);
      if (exact) { exact._used = true; return { csvTx, status: 'matched', manualTx: exact }; }

      // Close candidates: same amount within 2 days, OR same date within 20% amount
      const close = manualPool.filter(m => !m._used && (
        (m.amount === csvTx.amount && daysDiff(m.date, csvTx.date) <= 2) ||
        (m.date === csvTx.date && Math.abs(m.amount - csvTx.amount) / csvTx.amount < 0.2)
      ));

      return { csvTx, status: 'unmatched', close };
    });

    const duplicates = rows.filter(r => r.status === 'duplicate');
    const autoMatched = rows.filter(r => r.status === 'matched');
    const unmatched  = rows.filter(r => r.status === 'unmatched');

    // Decision state for unmatched rows: { action: 'new'|'link'|'skip', manualId, category }
    const decisions = {};
    unmatched.forEach(r => {
      decisions[r.csvTx.importHash] = { action: 'new', manualId: null, category: r.csvTx.category };
    });

    const updateConfirmBtn = () => {
      const nLinked = Object.values(decisions).filter(d => d.action === 'link').length;
      const nNew    = Object.values(decisions).filter(d => d.action === 'new').length;
      const nSkip   = Object.values(decisions).filter(d => d.action === 'skip').length;
      const total   = autoMatched.length + nLinked + nNew;
      confirmBtn.disabled = total === 0;
      confirmBtn.style.opacity = total === 0 ? '0.5' : '1';
      const parts = [];
      if (autoMatched.length + nLinked > 0) parts.push(`reconcile ${autoMatched.length + nLinked}`);
      if (nNew > 0) parts.push(`add ${nNew} new`);
      if (nSkip > 0) parts.push(`skip ${nSkip}`);
      confirmBtn.textContent = total === 0 ? 'Nothing to import ✓' : `Confirm — ${parts.join(', ')}`;
    };

    // ── Summary stats ──
    const summary = document.createElement('div');
    summary.style.cssText = 'font-size:13px;margin-bottom:12px;padding:10px 14px;background:var(--bg);border-radius:10px';
    summary.innerHTML = `

        </div>
        <div style="background:#EAB30815;border-radius:8px;padding:8px 4px">
          <div style="font-size:20px;font-weight:800;color:#92400E">${unmatched.length}</div>
          <div style="font-size:10px;color:#92400E;font-weight:600">UNMATCHED</div>

        </div>

    previewEl.appendChild(summary);

    // ── Auto-matched ──
    if (autoMatched.length > 0) {

      for (const { csvTx, manualTx } of autoMatched) {

        });

        previewEl.querySelectorAll('.recon-action-skip').forEach(btn => {
          btn.onclick = () => {
            const hash = btn.dataset.hash;
            decisions[hash] = { ...decisions[hash], action: 'skip' };

          };
        });
      }, 0);
    }

    function finishRow(hash, action, bg, color, label) {
      const panel = document.getElementById('panel-' + hash);
      if (panel) panel.style.display = 'none';
      const linkBtn = previewEl.querySelector(`.recon-link-btn[data-hash="${hash}"]`);
      if (linkBtn) {
        linkBtn.textContent = label;
        linkBtn.style.cssText = `font-size:11px;padding:4px 10px;border-radius:8px;border:1.5px solid ${color};background:${bg};color:${color};white-space:nowrap;pointer-events:none`;
      }
      updateConfirmBtn();
    }

    // ── Confirm button ──
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn btn-primary';
    confirmBtn.style.marginTop = '14px';
    previewEl.appendChild(confirmBtn);
    updateConfirmBtn();

    confirmBtn.onclick = () => {
      const { transactions } = getState();
      let updated = [...transactions];

      // Reconcile auto-matched manual entries
      for (const { manualTx } of autoMatched) {
        const idx = updated.findIndex(t => t.id === manualTx.id);
        if (idx >= 0) updated[idx] = { ...updated[idx], reconciled: true, paymentMethod: 'credit' };
      }

      // Apply decisions for unmatched rows
      const toAdd = [];
      for (const { csvTx } of unmatched) {
        const hash = csvTx.importHash;
        const dec = decisions[hash];
        if (!dec || dec.action === 'skip') continue;

        if (dec.action === 'link' && dec.manualId) {
          // Mark manual entry as reconciled
          const idx = updated.findIndex(t => t.id === dec.manualId);
          if (idx >= 0) updated[idx] = { ...updated[idx], reconciled: true, paymentMethod: 'credit' };
        } else {
          // Add as new imported transaction
          toAdd.push({
            id: uuid(),
            date: csvTx.date,
            amount: csvTx.amount,
            category: dec.category || csvTx.category,
            description: csvTx.description,
            paymentMethod: 'credit',
            source: 'smbc_import',
            importHash: hash,
            reconciled: true,
          });
        }
      }

      setState({ transactions: [...updated, ...toAdd] });

      const nReconciled = autoMatched.length + Object.values(decisions).filter(d => d.action === 'link').length;
      const nAdded = toAdd.length;
      const msg = [
        nReconciled > 0 ? `${nReconciled} reconciled` : '',
        nAdded > 0 ? `${nAdded} added` : '',
      ].filter(Boolean).join(', ');
      showToast(`Done — ${msg} ✓`);
      App.go('history');
    };
  };

}

function parseSMBCCSV(text) {
  const lines = text.split(/\r?\n/);
  const results = [];

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(',');
    if (cols.length < 6) continue;

    const type = cols[0].trim();
    if (type !== 'ショッピング') continue;

    const dateStr = cols[1].trim();
    const merchant = normalizeJP(cols[2]);
    const amountStr = cols[4].trim().replace(/[^\d]/g, '');
    const amount = parseInt(amountStr, 10);

    if (!amount || amount <= 0) continue;

    const dm = dateStr.match(/(\d{4})年(\d{2})月(\d{2})日/);
    if (!dm) continue;
    const date = `${dm[1]}-${dm[2]}-${dm[3]}`;

    const importHash = `smbc_${date}_${merchant}_${amount}`;

    results.push({
      date,
      description: merchant,
      amount,
      category: autoCategory(merchant),
      importHash,
    });
  }

  return results;
}

let _activeChart = null;

function getMonthlyData(transactions, numMonths) {
  // Use billing month as anchor so the current period is always included
  const currentBillingYm = currentMonthStr();
  const [cy, cm] = currentBillingYm.split('-').map(Number);
  return Array.from({ length: numMonths }, (_, i) => {
    const offset = numMonths - 1 - i;
    const d = new Date(cy, cm - 1 - offset, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const label = `${MONTHS[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`;
    const txs = getMonthTxs(transactions, ym);
    const spending = txs.filter(t => t.txType !== 'income' && t.category !== 'savings').reduce((s, t) => s + t.amount, 0);
    const saved    = txs.filter(t => t.txType !== 'income' && t.category === 'savings').reduce((s, t) => s + t.amount, 0);
    const income   = txs.filter(t => t.txType === 'income').reduce((s, t) => s + t.amount, 0);
    return { ym, label, spending, saved, income, txs };
  });
}

function renderCharts() {
  if (_activeChart) { _activeChart.destroy(); _activeChart = null; }

  const { transactions, monthlyBudget } = getState();
  const div = document.createElement('div');

  const hdr = document.createElement('div');
  hdr.className = 'header';
  hdr.innerHTML = `<h1>Charts</h1><div class="subtitle">Monthly income & spending</div>`;
  div.appendChild(hdr);

  const months = getMonthlyData(transactions, 12);
  const hasData = months.some(m => m.spending > 0 || m.income > 0 || m.saved > 0);

  if (!hasData) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="empty-icon">📊</div><p>No data yet.<br>Add transactions to see your history.</p>`;
    div.appendChild(empty);
    return div;
  }

  const chartCard = document.createElement('div');
  chartCard.className = 'card';
  chartCard.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="card-title" style="margin-bottom:0">Monthly Overview</div>
    </div>
    <div style="display:flex;gap:14px;font-size:11px;color:var(--text-muted);margin-bottom:12px">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#22C55E;margin-right:4px;vertical-align:middle"></span>Income</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#4F46E5;margin-right:4px;vertical-align:middle"></span>Spending</span>
      <span><span style="display:inline-block;width:18px;height:0;border-top:2px dashed #F97316;margin-right:4px;vertical-align:middle"></span>Budget</span>
    </div>
    <canvas id="monthly-chart"></canvas>
    <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:10px">Tap a bar to see that month's breakdown</div>
  `;
  div.appendChild(chartCard);

  const detailPanel = document.createElement('div');
  detailPanel.id = 'detail-panel';
  div.appendChild(detailPanel);

  setTimeout(() => {
    const canvas = chartCard.querySelector('#monthly-chart');
    const labels = months.map(m => m.label);

    const datasets = [
      {
        label: 'Income',
        data: months.map(m => m.income),
        backgroundColor: '#22C55E90',
        hoverBackgroundColor: '#22C55E',
        borderRadius: 5,
        borderSkipped: false,
      },
      {
        label: 'Spending',
        data: months.map(m => m.spending),
        backgroundColor: months.map(m =>
          monthlyBudget > 0 && m.spending > monthlyBudget ? '#EF444490' : '#4F46E590'
        ),
        hoverBackgroundColor: months.map(m =>
          monthlyBudget > 0 && m.spending > monthlyBudget ? '#EF4444' : '#4F46E5'
        ),
        borderRadius: 5,
        borderSkipped: false,
      },
    ];

    if (monthlyBudget > 0) {
      datasets.push({
        label: 'Budget',
        data: months.map(() => monthlyBudget),
        type: 'line',
        borderColor: '#F97316',
        borderWidth: 1.5,
        borderDash: [5, 4],
        pointRadius: 0,
        fill: false,
        tension: 0,
      });
    }

    _activeChart = new Chart(canvas, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        aspectRatio: 1.5,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `  ${ctx.dataset.label}: ¥${Math.round(ctx.parsed.y).toLocaleString('en-US')}`,
            },
          },
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              font: { size: 10 },
              callback: v => v >= 10000 ? '¥' + Math.round(v / 1000) + 'k' : '¥' + v,
              maxTicksLimit: 5,
            },
            grid: { color: '#F1F5F920' },
          },
          x: {
            ticks: { font: { size: 10 } },
            grid: { display: false },
          },
        },
        onClick: (_, elements) => {
          if (!elements.length) return;
          const idx = elements[0].index;
          showMonthDetail(months[idx], detailPanel);
        },
      },
    });

    const currentIdx = months.findIndex(m => m.ym === App.currentMonth);
    if (currentIdx >= 0 && months[currentIdx].txs.length > 0) {
      showMonthDetail(months[currentIdx], detailPanel);
    }
  }, 50);

  return div;
}

function showMonthDetail(monthData, container) {
  const { ym, spending, income, txs } = monthData;
  const expenseTxs = txs.filter(t => t.txType !== 'income' && t.category !== 'savings');
  const incomeTxs  = txs.filter(t => t.txType === 'income');
  const bycat = spentByCategory(expenseTxs);
  const byIncomeCat = incomeByCategory(incomeTxs);
  const net = income - spending;

  const activeCats = Object.entries(bycat)
    .filter(([, v]) => v > 0)
    .sort(([, a], [, b]) => b - a);

  container.innerHTML = '';

  // ── Summary row ──
  const breakCard = document.createElement('div');
  breakCard.className = 'card';
  breakCard.innerHTML = `
    <div class="card-title" style="margin-bottom:12px">${monthLabel(ym)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;text-align:center">
      <div style="background:#22C55E15;border-radius:8px;padding:8px 4px">
        <div style="font-size:10px;color:#15803D;font-weight:600;margin-bottom:2px">INCOME</div>
        <div style="font-size:14px;font-weight:800;color:#15803D">${fmtYen(income)}</div>
      </div>
      <div style="background:#4F46E515;border-radius:8px;padding:8px 4px">
        <div style="font-size:10px;color:#4F46E5;font-weight:600;margin-bottom:2px">SPENDING</div>
        <div style="font-size:14px;font-weight:800;color:#4F46E5">${fmtYen(spending)}</div>
      </div>
      <div style="background:${net >= 0 ? '#22C55E' : '#EF4444'}15;border-radius:8px;padding:8px 4px">
        <div style="font-size:10px;color:${net >= 0 ? '#15803D' : '#DC2626'};font-weight:600;margin-bottom:2px">NET</div>
        <div style="font-size:14px;font-weight:800;color:${net >= 0 ? '#15803D' : '#DC2626'}">${net >= 0 ? '+' : ''}${fmtYen(net)}</div>
      </div>
    </div>
  `;

  // Spending breakdown
  if (activeCats.length === 0) {
    breakCard.innerHTML += `<div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px">SPENDING BREAKDOWN</div><div style="color:var(--text-muted);font-size:14px;text-align:center;padding:8px 0">No spending recorded</div>`;
  } else {
    const spendHead = document.createElement('div');
    spendHead.style.cssText = 'font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px';
    spendHead.textContent = 'SPENDING BREAKDOWN';
    breakCard.appendChild(spendHead);
    for (const [key, amount] of activeCats) {
      const cat = CATEGORIES[key] || CATEGORIES.other;
      const pct = spending > 0 ? Math.round((amount / spending) * 100) : 0;
      const row = document.createElement('div');
      row.style.marginBottom = '10px';
      row.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:16px">${cat.emoji}</span>
            <span style="font-size:13px;font-weight:500">${cat.name}</span>
            <span style="font-size:11px;color:var(--text-muted)">${pct}%</span>
          </div>
          <span style="font-size:13px;font-weight:700">${fmtYen(amount)}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${cat.color}"></div>
        </div>
      `;
      breakCard.appendChild(row);
    }
  }

  // Income breakdown
  const activeIncome = Object.entries(byIncomeCat).filter(([, v]) => v > 0);
  if (activeIncome.length > 0) {
    const incHead = document.createElement('div');
    incHead.style.cssText = 'font-size:12px;font-weight:600;color:var(--text-muted);margin:14px 0 8px;border-top:1px solid var(--border);padding-top:12px';
    incHead.textContent = 'INCOME BREAKDOWN';
    breakCard.appendChild(incHead);
    for (const [key, amount] of activeIncome.sort(([,a],[,b]) => b - a)) {
      const ic = INCOME_CATEGORIES[key] || INCOME_CATEGORIES.other;
      const pct = income > 0 ? Math.round((amount / income) * 100) : 0;
      const row = document.createElement('div');
      row.style.marginBottom = '10px';
      row.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:16px">${ic.emoji}</span>
            <span style="font-size:13px;font-weight:500">${ic.name}</span>
            <span style="font-size:11px;color:var(--text-muted)">${pct}%</span>
          </div>
          <span style="font-size:13px;font-weight:700;color:#15803D">+${fmtYen(amount)}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${ic.color}"></div>
        </div>
      `;
      breakCard.appendChild(row);
    }
  }

  container.appendChild(breakCard);

  // ── Transaction list ──
  const sorted = [...txs].sort((a, b) => b.date.localeCompare(a.date));
  if (sorted.length > 0) {
    const txCard = document.createElement('div');
    txCard.className = 'card';
    txCard.innerHTML = `<div class="card-title">${sorted.length} Transaction${sorted.length !== 1 ? 's' : ''}</div>`;

    // Group by date
    const byDate = {};
    for (const tx of sorted) {
      if (!byDate[tx.date]) byDate[tx.date] = [];
      byDate[tx.date].push(tx);
    }
    for (const [date, txs] of Object.entries(byDate)) {
      const dateRow = document.createElement('div');
      dateRow.style.cssText = 'font-size:11px;color:var(--text-muted);font-weight:600;padding:6px 0 2px;border-top:1px solid var(--bg);margin-top:4px';
      dateRow.textContent = fmtDate(date);
      txCard.appendChild(dateRow);
      for (const tx of txs) {
        txCard.appendChild(makeTxItem(tx, () => {
          App.editingTx = { ...tx };
          App.go('add', { resetEdit: false });
        }));
      }
    }
    container.appendChild(txCard);
  }

  // Smooth scroll to detail
  setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

// ════════════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════════════

App.render();
</script>
